name: case-assistant

services:
  postgres:
    image: postgres:17-alpine
    container_name: case-assistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-case_assistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-case_assistant}
      POSTGRES_DB: ${POSTGRES_DB:-case_assistant}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-case_assistant}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: case-assistant-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2
    container_name: case-assistant-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-CaseAssistant123!}
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: case-assistant-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  api:
    profiles: ["full"]
    build:
      context: ../..
      dockerfile: infra/dockerfiles/api.Dockerfile
    container_name: case-assistant-api
    restart: unless-stopped
    env_file: ../../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-case_assistant}:${POSTGRES_PASSWORD:-case_assistant}@postgres:5432/${POSTGRES_DB:-case_assistant}
      CASE_REPOSITORY_BACKEND: ${CASE_REPOSITORY_BACKEND:-postgres}
      CASE_TABLE_NAME: ${CASE_TABLE_NAME:-cases}
      REDIS_URL: redis://redis:6379/0
      JOB_EXECUTOR_BACKEND: arq
      JOB_STORE_BACKEND: postgres
      OPENSEARCH_URL: http://opensearch:9200
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      opensearch: { condition: service_healthy }
      qdrant: { condition: service_started }

  worker:
    profiles: ["full"]
    build:
      context: ../..
      dockerfile: infra/dockerfiles/api.Dockerfile
    container_name: case-assistant-worker
    restart: unless-stopped
    env_file: ../../.env
    command: ["uv", "run", "arq", "case_assistant_api.workers.arq.settings.WorkerSettings"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-case_assistant}:${POSTGRES_PASSWORD:-case_assistant}@postgres:5432/${POSTGRES_DB:-case_assistant}
      CASE_REPOSITORY_BACKEND: ${CASE_REPOSITORY_BACKEND:-postgres}
      CASE_TABLE_NAME: ${CASE_TABLE_NAME:-cases}
      REDIS_URL: redis://redis:6379/0
      JOB_EXECUTOR_BACKEND: arq
      JOB_STORE_BACKEND: postgres
      OPENSEARCH_URL: http://opensearch:9200
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      opensearch: { condition: service_healthy }
      qdrant: { condition: service_started }

volumes:
  postgres-data:
  redis-data:
  opensearch-data:
  qdrant-data:
